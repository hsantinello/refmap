name: Publicar

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão (ex: 0.0.15)'
        required: false

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --mac --universal

      - name: Publicar no Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '0.0.0' }}
          name: "Ref Map v${{ github.event.inputs.version || '0.0.0' }}"
          draft: false
          prerelease: false
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --win

      - name: Publicar no Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version || '0.0.0' }}
          name: "Ref Map v${{ github.event.inputs.version || '0.0.0' }}"
          draft: false
          prerelease: false
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
